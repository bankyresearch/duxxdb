# Prometheus scrape config used by the optional `prometheus` service in
# docker-compose.yml.
#
# To start the scraper:
#   docker compose --profile metrics up -d
# Prometheus UI is then on http://localhost:9090.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: duxxdb
    metrics_path: /metrics
    static_configs:
      - targets:
          - duxxdb:9100
        labels:
          service: duxxdb
          env: docker
