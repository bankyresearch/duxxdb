# Minimal-but-correct Kubernetes manifest for DuxxDB.
#
# Apply with:
#   kubectl create namespace duxxdb
#   kubectl -n duxxdb create secret generic duxxdb-token \
#     --from-literal=token=$(openssl rand -hex 32)
#   kubectl -n duxxdb apply -f packaging/k8s/duxxdb.yaml
#
# Verify:
#   kubectl -n duxxdb get pods
#   kubectl -n duxxdb port-forward svc/duxxdb 6379:6379
#   redis-cli -p 6379 -a "$(kubectl -n duxxdb get secret duxxdb-token -o jsonpath='{.data.token}' | base64 -d)" PING
#
# This file uses a StatefulSet so the persistent volume sticks with the
# pod identity; replicas=1 because Phase 6.1 is single-node. Distributed
# deployment ships in Phase 6.3+.

apiVersion: v1
kind: ConfigMap
metadata:
  name: duxxdb-config
data:
  DUXX_STORAGE: "dir:/var/lib/duxxdb"
  DUXX_EMBEDDER: "hash:32"
  DUXX_METRICS_ADDR: "0.0.0.0:9100"
  RUST_LOG: "info"

---
apiVersion: v1
kind: Service
metadata:
  name: duxxdb
  labels:
    app: duxxdb
spec:
  type: ClusterIP
  selector:
    app: duxxdb
  ports:
    - name: resp
      port: 6379
      targetPort: 6379
    - name: metrics
      port: 9100
      targetPort: 9100

---
apiVersion: v1
kind: Service
metadata:
  name: duxxdb-headless
  labels:
    app: duxxdb
spec:
  clusterIP: None
  selector:
    app: duxxdb
  ports:
    - name: resp
      port: 6379

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: duxxdb
  labels:
    app: duxxdb
spec:
  serviceName: duxxdb-headless
  replicas: 1
  selector:
    matchLabels:
      app: duxxdb
  template:
    metadata:
      labels:
        app: duxxdb
      annotations:
        # Lets Prometheus scrape /metrics if you run prometheus-operator.
        prometheus.io/scrape: "true"
        prometheus.io/port: "9100"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        runAsNonRoot: true
      terminationGracePeriodSeconds: 45  # > --drain-secs in args
      containers:
        - name: duxxdb
          image: ghcr.io/bankyresearch/duxxdb:latest
          imagePullPolicy: IfNotPresent
          args:
            - --addr
            - 0.0.0.0:6379
            - --drain-secs
            - "30"
          envFrom:
            - configMapRef:
                name: duxxdb-config
          env:
            - name: DUXX_TOKEN
              valueFrom:
                secretKeyRef:
                  name: duxxdb-token
                  key: token
          ports:
            - name: resp
              containerPort: 6379
            - name: metrics
              containerPort: 9100
          # Liveness uses /health (always 200 if process is up).
          livenessProbe:
            httpGet:
              path: /health
              port: 9100
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          # Readiness uses RESP PING (allowed pre-AUTH per Phase 6.1).
          readinessProbe:
            exec:
              command: ["redis-cli", "-h", "127.0.0.1", "-p", "6379", "PING"]
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 2
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
          volumeMounts:
            - name: data
              mountPath: /var/lib/duxxdb
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
