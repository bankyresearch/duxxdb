<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="0.55" stop-color="#241b6b"/>
      <stop offset="1" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#818cf8" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="1280" height="640" fill="url(#bg)"/>
  <circle cx="1050" cy="150" r="360" fill="url(#glow)"/>
  <circle cx="180" cy="560" r="300" fill="url(#glow)" opacity="0.5"/>

  <!-- Retrieval-graph motif, upper right -->
  <g stroke="url(#accent)" stroke-width="1.6" opacity="0.35">
    <line x1="1000" y1="70" x2="1110" y2="130"/>
    <line x1="1110" y1="130" x2="1050" y2="235"/>
    <line x1="1050" y1="235" x2="940" y2="180"/>
    <line x1="940" y1="180" x2="1000" y2="70"/>
    <line x1="1110" y1="130" x2="1205" y2="90"/>
    <line x1="1110" y1="130" x2="1200" y2="215"/>
    <line x1="1050" y1="235" x2="1150" y2="285"/>
  </g>
  <g fill="#0b1020" stroke="url(#accent)" stroke-width="2.4" opacity="0.9">
    <circle cx="1000" cy="70"  r="11"/>
    <circle cx="940"  cy="180" r="9"/>
    <circle cx="1050" cy="235" r="9"/>
    <circle cx="1205" cy="90"  r="8"/>
    <circle cx="1200" cy="215" r="8"/>
    <circle cx="1150" cy="285" r="7"/>
  </g>
  <circle cx="1110" cy="130" r="16" fill="url(#accent)"/>

  <!-- Wordmark -->
  <text x="90" y="300" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="150" font-weight="800" fill="#ffffff" letter-spacing="-4">Duxx<tspan fill="#22d3ee">DB</tspan></text>

  <!-- Tagline -->
  <text x="96" y="372" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="44" font-weight="500" fill="#c7d2fe">The database built for AI agents.</text>

  <!-- Feature pills -->
  <g font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="26" font-weight="600">
    <g transform="translate(96,428)">
      <rect width="290" height="56" rx="28" fill="#ffffff" opacity="0.09"/>
      <text x="28" y="37" fill="#e0e7ff">Vector + BM25 + SQL</text>
    </g>
    <g transform="translate(404,428)">
      <rect width="228" height="56" rx="28" fill="#ffffff" opacity="0.09"/>
      <text x="28" y="37" fill="#e0e7ff">Agent memory</text>
    </g>
    <g transform="translate(650,428)">
      <rect width="286" height="56" rx="28" fill="#ffffff" opacity="0.09"/>
      <text x="28" y="37" fill="#e0e7ff">RESP · gRPC · MCP</text>
    </g>
  </g>

  <!-- Bottom strip -->
  <text x="96" y="556" font-family="'Consolas','SF Mono',monospace" font-size="30" font-weight="600" fill="#a5b4fc">$ pip install duxxdb</text>
  <text x="96" y="596" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="24" font-weight="500" fill="#8b93c9">Apache-2.0 · Rust · embedded-or-server · hybrid recall in one query plan</text>
</svg>
