# Serves the built React SPA and proxies the two backend APIs same-origin
# (so the browser has no CORS issues). Mirrors frontend/vite.config.ts.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA client-side routing fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # /api/control/v1/orgs  ->  control:7070/v1/orgs
    location /api/control/ {
        proxy_pass http://control:7070/;
        proxy_set_header Host $host;
    }

    # /api/studio/overview  ->  server:7072/studio/overview
    location /api/studio/ {
        proxy_pass http://server:7072/studio/;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }
}
