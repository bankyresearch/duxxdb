# DuxxDB Cloud — full-stack quickstart (single host / single EC2).
#
#   JWT_SECRET=$(openssl rand -hex 32) docker compose up --build
#
# Then open:  http://localhost:8080  (React frontend → Console + Studio)
#             http://localhost:7070  (embedded Console UI)
#             http://localhost:7072  (embedded Studio UI)
#
# In production these processes spread across nodes (see docs/DEPLOYMENT_AWS.md);
# this compose runs them together for development / a single EC2 box.
name: duxxdb-cloud

services:
  # --- Control-plane metadata DB (for the PostgresStore drop-in) -----------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: duxx_control
      POSTGRES_USER: duxx
      POSTGRES_PASSWORD: ${PG_PASSWORD:-duxx-dev-password}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U duxx"]
      interval: 10s
      retries: 5

  # --- Object storage for document bytes (S3Connector drop-in) -------------
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-duxx}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-duxx-dev-password}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # console
    volumes:
      - miniodata:/data

  # --- Control plane (orgs/projects/keys/JWT issuance + Console) -----------
  control:
    build: ..
    image: duxxdb:latest
    entrypoint: ["/usr/bin/tini", "--", "/usr/local/bin/duxx-control"]
    command: ["serve", "0.0.0.0:7070"]
    environment:
      DUXX_CONTROL_JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
    ports:
      - "7070:7070"
    depends_on:
      postgres:
        condition: service_healthy

  # --- Data plane (RESP + Studio + OTLP + metrics; durable workspaces) -----
  server:
    image: duxxdb:latest
    command:
      - "--addr=0.0.0.0:6379"
      - "--jwt-secret=${JWT_SECRET:?set JWT_SECRET}"
      - "--studio-addr=0.0.0.0:7072"
      - "--otlp-addr=0.0.0.0:4318"
      - "--metrics-addr=0.0.0.0:9100"
      - "--tenants-dir=/var/lib/duxxdb/ws"
    ports:
      - "6379:6379"   # RESP (redis-cli compatible)
      - "7072:7072"   # Studio read-API + UI
      - "4318:4318"   # OTLP/HTTP trace receiver
      - "9100:9100"   # Prometheus metrics
    volumes:
      - wsdata:/var/lib/duxxdb/ws
    depends_on:
      - control

  # --- React frontend (Console + Studio), nginx proxying to the APIs -------
  frontend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.frontend
    ports:
      - "8080:80"
    depends_on:
      - control
      - server

volumes:
  pgdata:
  miniodata:
  wsdata:
