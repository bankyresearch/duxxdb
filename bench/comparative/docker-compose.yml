# Network-served targets for the comparative bench.
#
#   docker compose -f docker-compose.yml up -d
#   python bench.py --backend redis  --n 10000 --queries 200
#   python bench.py --backend qdrant --n 10000 --queries 200
#   python bench.py --backend pgvector --n 10000 --queries 200
#
# These are stubs — the corresponding Backend classes in bench.py are
# TODO. Once written they let you measure DuxxDB-network latencies (via
# the duxx-grpc daemon) against the same network-served peers.

services:
  redis-stack:
    image: redis/redis-stack:7.4.0-v0
    ports: ["6379:6379"]
    volumes: ["redis-data:/data"]

  qdrant:
    image: qdrant/qdrant:v1.13.0
    ports: ["6333:6333", "6334:6334"]
    volumes: ["qdrant-data:/qdrant/storage"]

  pgvector:
    image: pgvector/pgvector:pg16
    ports: ["5432:5432"]
    environment:
      POSTGRES_PASSWORD: bench
      POSTGRES_DB: duxx_bench
    volumes: ["pg-data:/var/lib/postgresql/data"]

  # DuxxDB (gRPC) for network-vs-network parity. Build the binary
  # locally first: scripts/build.sh build -p duxx-grpc --release
  # Then comment out the build directive and uncomment the image
  # once we publish a Docker image.
  # duxxdb:
  #   build:
  #     context: ../..
  #     dockerfile: Dockerfile
  #   ports: ["50051:50051"]
  #   environment:
  #     DUXX_STORAGE: dir:/data
  #   volumes: ["duxx-data:/data"]

volumes:
  redis-data:
  qdrant-data:
  pg-data:
  # duxx-data:
