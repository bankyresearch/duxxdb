syntax = "proto3";

package duxx.v1;

// DuxxDB - the database built for AI agents.
//
// Mirrors the embedded Rust API and the RESP TCP server. Use this
// service when you need typed cross-language streaming (e.g. Python
// agents subscribing to a fleet of memory writes).
service Duxx {
    // Store a memory. Returns the assigned id.
    rpc Remember(RememberRequest) returns (RememberResponse);

    // Bulk-store many memories in one call (parallel index build).
    rpc RememberBatch(RememberBatchRequest) returns (RememberBatchResponse);

    // Top-k hybrid recall (vector + BM25, RRF-fused).
    rpc Recall(RecallRequest) returns (RecallResponse);

    // Stable keyset pagination over all memories (ordered by id). Start with
    // cursor 0; `has_more=false` marks the end.
    rpc Scan(ScanRequest) returns (ScanResponse);

    // Rebuild the index from surviving rows, dropping tombstones left by
    // forgotten/evicted rows. Restores recall quality. Returns the number
    // of tombstones reclaimed and the post-compaction tombstone ratio.
    rpc Compact(CompactRequest) returns (CompactResponse);

    // Erase memories by subject key (GDPR) or by age (retention). Returns the
    // count removed; run Compact after for no recoverable trace.
    rpc Erase(EraseRequest) returns (EraseResponse);

    // Subscribe to memory change events. Server streams a ChangeEvent
    // for every `remember` call whose channel matches the (optional)
    // glob pattern. An empty pattern matches all events.
    rpc Subscribe(SubscribeRequest) returns (stream ChangeEvent);

    // Server stats / health probe.
    rpc Stats(StatsRequest) returns (StatsResponse);

    // Liveness check.
    rpc Ping(PingRequest) returns (PingResponse);
}

// ----- messages ------------------------------------------------------------

message RememberRequest {
    string key = 1;
    string text = 2;
    // Optional. If empty, the server's configured embedder is used.
    repeated float embedding = 3;
    // Optional idempotency key: a repeat within the TTL returns the original id.
    string idempotency_key = 4;
    // Optional metadata. importance 0 -> default 1.0.
    float importance = 5;
    string kind = 6;
    repeated string tags = 7;
    string provenance = 8;
}

message RememberResponse {
    uint64 id = 1;
}

message RememberItem {
    string key = 1;
    string text = 2;
    // Optional. If empty, the server's configured embedder is used.
    repeated float embedding = 3;
}

message RememberBatchRequest {
    repeated RememberItem items = 1;
}

message RememberBatchResponse {
    repeated uint64 ids = 1;
}

message RecallRequest {
    string key = 1;
    string query = 2;
    // Optional. If empty, the server's configured embedder is used.
    repeated float embedding = 3;
    uint32 k = 4;  // 0 -> default 10
    // Optional structured pre-retrieval filter (empty/zero fields ignored).
    string filter_kind = 5;
    repeated string filter_tags_any = 6;
    double filter_within_secs = 7;  // only memories created within the last N seconds
}

message RecallResponse {
    repeated MemoryHit hits = 1;
}

message ScanRequest {
    uint64 cursor = 1;  // 0 to start
    uint32 limit = 2;   // 0 -> default 10
}

message ScanResponse {
    repeated MemoryHit memories = 1;  // score is unused (0) for scans
    uint64 next_cursor = 2;
    bool has_more = 3;                // false once the scan is exhausted
}

message MemoryHit {
    uint64 id = 1;
    string key = 2;
    string text = 3;
    float score = 4;
    // Metadata (empty/zero when unset).
    float importance = 5;
    string kind = 6;
    repeated string tags = 7;
    string provenance = 8;
}

message SubscribeRequest {
    // Glob pattern matched against `<table>.<key>` channels (e.g.
    // "memory.alice", "memory.*"). Empty = match all.
    string pattern = 1;
}

message ChangeEvent {
    string table = 1;
    string key = 2;
    uint64 row_id = 3;
    Kind kind = 4;
    // The full channel string this event was published to.
    string channel = 5;

    enum Kind {
        UNSPECIFIED = 0;
        INSERT = 1;
        UPDATE = 2;
        DELETE = 3;
    }
}

message CompactRequest {}

message CompactResponse {
    uint64 reclaimed = 1;
    float tombstone_ratio = 2;
}

message EraseRequest {
    string key = 1;             // erase all memories under this key (GDPR subject)
    double older_than_secs = 2; // OR purge rows older than this many seconds
}

message EraseResponse {
    uint64 count = 1;
}

message StatsRequest {}

message StatsResponse {
    uint64 memories = 1;
    uint64 sessions = 2;
    uint32 dim = 3;
    string version = 4;
    // Memory-store compaction health (mirrors the Prometheus gauges).
    float tombstone_ratio = 5;  // (indexed - live) / live
    uint64 compactions = 6;     // graph compactions performed (manual + auto)
    uint32 protocol_version = 7; // DuxxDB command-schema version
}

message PingRequest {
    string nonce = 1;
}

message PingResponse {
    string nonce = 1;
}
