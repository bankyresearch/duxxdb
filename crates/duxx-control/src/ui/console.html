<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>DuxxDB Cloud — Control Console</title>
<style>
  :root{--bg:#0d1117;--panel:#161b22;--panel2:#1c2230;--border:#30363d;--fg:#e6edf3;--muted:#8b949e;--accent:#2f81f7;--good:#3fb950;--bad:#f85149;--warn:#d29922;--radius:8px}
  *{box-sizing:border-box}
  body{margin:0;font:14px/1.5 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--fg)}
  a{color:var(--accent)}
  header{display:flex;align-items:center;gap:12px;padding:14px 22px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:5}
  header .logo{font-weight:700;font-size:16px}
  header .sub{color:var(--muted);font-size:13px}
  header .spacer{flex:1}
  .layout{display:grid;grid-template-columns:280px 1fr;min-height:calc(100vh - 53px)}
  .sidebar{border-right:1px solid var(--border);padding:18px;overflow:auto}
  main{padding:22px;overflow:auto}
  h2{font-size:12px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin:0 0 12px}
  h3{font-size:14px;margin:20px 0 10px}
  input,select,button,textarea{font:inherit;padding:8px 11px;border-radius:6px;border:1px solid var(--border);background:#0d1117;color:var(--fg)}
  input,select{width:100%}
  .field{margin-bottom:9px}
  label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px}
  button{background:var(--accent);border-color:var(--accent);color:#fff;cursor:pointer;white-space:nowrap}
  button:hover{filter:brightness(1.1)} button:disabled{opacity:.5;cursor:default;filter:none}
  button.ghost{background:transparent;color:var(--fg)}
  button.danger{background:transparent;border-color:var(--bad);color:var(--bad)}
  button.sm{padding:4px 9px;font-size:12px}
  .newrow{display:flex;gap:8px;margin-bottom:12px}.newrow input{flex:1}
  ul.list{list-style:none;margin:0;padding:0}
  ul.list li{padding:9px 11px;border:1px solid var(--border);border-radius:6px;margin-bottom:7px;cursor:pointer;display:flex;justify-content:space-between;gap:8px;align-items:center}
  ul.list li:hover{border-color:var(--accent)}
  ul.list li.active{border-color:var(--accent);background:var(--panel2)}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:16px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .row{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap}
  .row .field{flex:1;margin-bottom:0;min-width:120px}
  table{width:100%;border-collapse:collapse;margin-top:6px}
  th,td{text-align:left;padding:8px 9px;border-bottom:1px solid var(--border);font-size:13px}
  th{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.04em}
  td .actions{display:flex;gap:6px;justify-content:flex-end}
  .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;word-break:break-all}
  .muted{color:var(--muted)} .small{font-size:12px}
  .pill{font-size:11px;padding:1px 8px;border-radius:999px;border:1px solid var(--border);color:var(--muted)}
  .pill.good{color:var(--good);border-color:var(--good)} .pill.bad{color:var(--bad);border-color:var(--bad)} .pill.warn{color:var(--warn);border-color:var(--warn)}
  .reveal{background:#0d1117;border:1px dashed var(--good);border-radius:6px;padding:10px;margin-top:10px}
  .reveal.accent{border-color:var(--accent)}
  .tabs{display:flex;gap:8px;margin-bottom:16px;border-bottom:1px solid var(--border)}
  .tabs button{background:transparent;border:none;border-bottom:2px solid transparent;color:var(--muted);border-radius:0;padding:8px 4px}
  .tabs button.active{color:var(--fg);border-bottom-color:var(--accent)}
  .empty{color:var(--muted);padding:18px;text-align:center;border:1px dashed var(--border);border-radius:6px}
  .err{color:var(--bad)}
  .stat{display:inline-block;background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:10px 16px;margin:0 10px 10px 0}
  .stat b{display:block;font-size:20px} .stat span{color:var(--muted);font-size:12px}
  #toast{position:fixed;bottom:22px;right:22px;background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:11px 16px;opacity:0;transform:translateY(8px);transition:.2s;max-width:380px}
  #toast.show{opacity:1;transform:none} #toast.bad{border-color:var(--bad)}
</style>
</head>
<body>
<header>
  <span class="logo">DuxxDB Cloud</span>
  <span class="sub">Control Console</span>
  <span class="spacer"></span>
  <span class="pill" id="health">connecting…</span>
</header>
<div class="layout">
  <aside class="sidebar">
    <h2>Organizations</h2>
    <div class="newrow"><input id="orgName" placeholder="New org name" onkeydown="if(event.key==='Enter')createOrg()"/><button onclick="createOrg()">Create</button></div>
    <ul class="list" id="orgs"><li class="muted">loading…</li></ul>
  </aside>
  <main id="main"><div class="empty">Select or create an organization to begin.</div></main>
</div>
<div id="toast"></div>

<script>
const S = { org:null, tab:'projects', project:null, lastSecret:null };
const $ = id => document.getElementById(id);
const esc = s => String(s ?? '').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const short = s => s ? esc(s.length>16 ? s.slice(0,14)+'…' : s) : '';
function toast(msg,bad){const t=$('toast');t.textContent=msg;t.className='show'+(bad?' bad':'');setTimeout(()=>t.className='',2200);}
function copy(text){navigator.clipboard.writeText(text).then(()=>toast('Copied to clipboard'));}
async function api(method,path,body){
  const r = await fetch(path,{method,headers:body?{'content-type':'application/json'}:{},body:body?JSON.stringify(body):undefined});
  const j = await r.json().catch(()=>({}));
  if(!r.ok) throw new Error(j.error || (r.status+' '+r.statusText));
  return j;
}
function guard(fn){ return (...a)=>fn(...a).catch(e=>toast(e.message,true)); }

// ---- orgs -----------------------------------------------------------------
const loadOrgs = guard(async ()=>{
  const {orgs} = await api('GET','/v1/orgs');
  $('orgs').innerHTML = orgs.length ? orgs.map(o=>
    `<li class="${S.org&&S.org.id===o.id?'active':''}" onclick='selectOrg(${JSON.stringify(o)})'>
       <span>${esc(o.name)}</span><span class="mono muted small">${short(o.id)}</span></li>`).join('')
    : '<li class="muted">no orgs yet</li>';
});
const createOrg = guard(async ()=>{
  const name=$('orgName').value.trim(); if(!name) return;
  const o=await api('POST','/v1/orgs',{name}); $('orgName').value='';
  await loadOrgs(); selectOrg(o); toast('Organization created');
});
async function selectOrg(o){ S.org=o; S.project=null; S.tab='projects'; await loadOrgs(); renderOrg(); }

function renderOrg(){
  if(!S.org){ $('main').innerHTML='<div class="empty">Select or create an organization to begin.</div>'; return; }
  $('main').innerHTML = `
    <div style="display:flex;align-items:baseline;gap:10px"><h2 style="margin:0">${esc(S.org.name)}</h2>
      <span class="mono muted small">${esc(S.org.id)}</span></div>
    <div class="tabs">
      <button class="${S.tab==='projects'?'active':''}" onclick="setTab('projects')">Projects</button>
      <button class="${S.tab==='members'?'active':''}" onclick="setTab('members')">Members</button>
    </div>
    <div id="panel"></div>`;
  S.tab==='projects' ? renderProjects() : renderMembers();
}
function setTab(t){ S.tab=t; renderOrg(); }

// ---- projects -------------------------------------------------------------
const renderProjects = guard(async ()=>{
  const {projects} = await api('POST','/v1/projects/list',{org_id:S.org.id});
  $('panel').innerHTML = `
    <div class="card">
      <div class="newrow"><input id="projName" placeholder="New project name" onkeydown="if(event.key==='Enter')createProject()"/><button onclick="createProject()">Create project</button></div>
      ${projects.length ? '<ul class="list">'+projects.map(p=>
        `<li class="${S.project&&S.project.id===p.id?'active':''}" onclick='selectProject(${JSON.stringify(p)})'>
           <span>${esc(p.name)}</span><span class="mono muted small">${short(p.id)}</span></li>`).join('')+'</ul>'
        : '<div class="empty">No projects yet.</div>'}
    </div>
    <div id="projDetail"></div>`;
  if(S.project && projects.some(p=>p.id===S.project.id)) renderProjectDetail();
});
const createProject = guard(async ()=>{
  const name=$('projName').value.trim(); if(!name) return;
  const p=await api('POST','/v1/projects',{org_id:S.org.id,name});
  await selectProject(p); toast('Project created');
});
async function selectProject(p){ S.project=p; await renderProjects(); }

const renderProjectDetail = guard(async ()=>{
  const p=S.project;
  const [{keys},usage] = await Promise.all([
    api('POST','/v1/keys/list',{project_id:p.id}),
    api('POST','/v1/usage/query',{project_id:p.id}),
  ]);
  $('projDetail').innerHTML = `
    <div class="card">
      <h3 style="margin-top:0">Project · ${esc(p.name)}</h3>
      <div class="grid2">
        <div>
          <label>Issue API key</label>
          <div class="row">
            <div class="field"><label>Env</label><select id="kEnv"><option>prod</option><option>staging</option><option>dev</option></select></div>
            <div class="field"><label>Role</label><select id="kRole"><option>service</option><option>developer</option><option>observer</option><option>evaluator</option><option>admin</option><option>owner</option></select></div>
          </div>
          <div class="field" style="margin-top:8px"><input id="kName" placeholder="Key name (e.g. agent-runtime)"/></div>
          <button onclick="issueKey()">Issue key</button>
          <div id="secretBox"></div>
        </div>
        <div>
          <label>Placement</label>
          <div class="row">
            <div class="field"><input id="node" placeholder="node host:port" value="${esc(placeholderNode())}"/></div>
            <div class="field" style="max-width:140px"><select id="mode"><option>shared</option><option>dedicated</option></select></div>
            <button class="ghost" onclick="placeProject()">Place</button>
          </div>
          <div id="placeInfo" class="small muted" style="margin-top:8px"></div>
          <label style="margin-top:16px">Usage</label>
          <div>
            <span class="stat"><b>${usage.requests||0}</b><span>requests</span></span>
            <span class="stat"><b>${(usage.tokens_in||0)+(usage.tokens_out||0)}</b><span>tokens</span></span>
            <span class="stat"><b>$${Number(usage.cost_usd||0).toFixed(4)}</b><span>spend</span></span>
          </div>
        </div>
      </div>
      <h3>Keys</h3>
      ${keys.length ? `<table><thead><tr><th>Name</th><th>Role</th><th>Env</th><th>Status</th><th></th></tr></thead><tbody>${
        keys.map(k=>`<tr>
          <td>${esc(k.name)||'<span class=muted>(unnamed)</span>'}</td>
          <td><span class="pill">${esc(k.role)}</span></td>
          <td><span class="pill">${esc(k.env)}</span></td>
          <td>${k.revoked?'<span class="pill bad">revoked</span>':'<span class="pill good">active</span>'}</td>
          <td><div class="actions">
            ${k.revoked?'':`<button class="ghost sm" onclick="rotateKey('${k.id}')">Rotate</button>
            <button class="danger sm" onclick="revokeKey('${k.id}')">Revoke</button>`}
          </div></td></tr>`).join('')}</tbody></table>` : '<div class="empty">No keys issued.</div>'}
    </div>`;
  refreshPlacement();
});
function placeholderNode(){ return '127.0.0.1:6380'; }

const issueKey = guard(async ()=>{
  const k=await api('POST','/v1/keys',{project_id:S.project.id,env:$('kEnv').value,role:$('kRole').value,name:$('kName').value.trim()||'key'});
  S.lastSecret=k.secret;
  $('secretBox').innerHTML = `<div class="reveal small">Secret (shown once): <span class="mono">${esc(k.secret)}</span>
     <div style="margin-top:8px;display:flex;gap:8px">
       <button class="ghost sm" onclick="copy('${k.secret}')">Copy secret</button>
       <button class="sm" onclick="mintToken('${k.secret}')">Mint workspace JWT →</button></div>
     <div id="jwtBox"></div></div>`;
  await renderProjectDetail();
  toast('Key issued — copy the secret now');
});
const revokeKey = guard(async (id)=>{
  if(!confirm('Revoke this key? Clients using it will be denied immediately.')) return;
  await api('POST','/v1/keys/revoke',{key_id:id}); await renderProjectDetail(); toast('Key revoked');
});
const rotateKey = guard(async (id)=>{
  if(!confirm('Rotate this key? The current secret stops working immediately.')) return;
  const k=await api('POST','/v1/keys/rotate',{key_id:id});
  await renderProjectDetail();
  $('secretBox').innerHTML = `<div class="reveal small">New secret: <span class="mono">${esc(k.secret)}</span>
     <div style="margin-top:8px"><button class="ghost sm" onclick="copy('${k.secret}')">Copy secret</button></div></div>`;
  toast('Key rotated');
});
const mintToken = guard(async (secret)=>{
  const {jwt}=await api('POST','/v1/tokens',{api_key_secret:secret,ttl_secs:900});
  ($('jwtBox')||$('secretBox')).innerHTML += `<div class="reveal accent small" style="margin-top:10px">Workspace JWT (15 min):
    <span class="mono">${esc(jwt)}</span><div style="margin-top:8px"><button class="sm" onclick="copy('${jwt}')">Copy for Studio</button></div></div>`;
});

const placeProject = guard(async ()=>{
  const node=$('node').value.trim(); if(!node) return;
  await api('POST','/v1/placements',{project_id:S.project.id,node,mode:$('mode').value});
  toast('Project placed on '+node); refreshPlacement();
});
const refreshPlacement = guard(async ()=>{
  const node=($('node')&&$('node').value.trim())||placeholderNode();
  const {entries}=await api('POST','/v1/auth-entries',{node});
  if($('placeInfo')) $('placeInfo').innerHTML = `${entries.length} auth-key line(s) for <span class="mono">${esc(node)}</span>`;
});

// ---- members --------------------------------------------------------------
const renderMembers = guard(async ()=>{
  const {members} = await api('POST','/v1/members/list',{org_id:S.org.id});
  $('panel').innerHTML = `
    <div class="card">
      <label>Invite a member</label>
      <div class="row">
        <div class="field"><input id="mEmail" placeholder="email@company.com"/></div>
        <div class="field" style="max-width:170px"><select id="mRole"><option>developer</option><option>admin</option><option>observer</option><option>evaluator</option><option>owner</option></select></div>
        <button onclick="inviteMember()">Send invite</button>
      </div>
      <div id="inviteBox"></div>
      <h3>Members</h3>
      ${members.length ? `<table><thead><tr><th>Email</th><th>Role</th><th>Status</th><th></th></tr></thead><tbody>${
        members.map(m=>`<tr>
          <td>${esc(m.email)}</td>
          <td><span class="pill">${esc(m.role)}</span></td>
          <td>${m.status==='Active'?'<span class="pill good">active</span>':'<span class="pill warn">invited</span>'}</td>
          <td><div class="actions"><button class="danger sm" onclick="removeMember('${m.id}','${esc(m.email)}')">Remove</button></div></td>
        </tr>`).join('')}</tbody></table>` : '<div class="empty">No members yet.</div>'}
    </div>`;
});
const inviteMember = guard(async ()=>{
  const email=$('mEmail').value.trim(); if(!email) return;
  const {invite_token}=await api('POST','/v1/members/invite',{org_id:S.org.id,email,role:$('mRole').value});
  $('inviteBox').innerHTML = `<div class="reveal small">Invite token for ${esc(email)}: <span class="mono">${esc(invite_token)}</span>
    <div style="margin-top:8px"><button class="ghost sm" onclick="copy('${invite_token}')">Copy invite</button></div></div>`;
  await renderMembers(); toast('Invite created');
});
const removeMember = guard(async (id,email)=>{
  if(!confirm('Remove '+email+' from this organization?')) return;
  await api('POST','/v1/members/remove',{member_id:id}); await renderMembers(); toast('Member removed');
});

// ---- boot -----------------------------------------------------------------
(async ()=>{
  try{ await api('GET','/healthz'); $('health').textContent='● online'; $('health').className='pill good'; }
  catch{ $('health').textContent='● offline'; $('health').className='pill bad'; }
  loadOrgs();
})();
</script>
</body>
</html>
