name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # -----------------------------------------------------------------
  # cargo test on every supported OS.
  # -----------------------------------------------------------------
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable

      # protoc is needed for the duxx-grpc build.rs (tonic-build).
      - name: Install protoc (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install protoc (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install protobuf

      - name: Install protoc (Windows)
        if: matrix.os == 'windows-latest'
        uses: arduino/setup-protoc@v3
        with:
          version: '34.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: test-${{ matrix.os }}

      - name: cargo build --workspace
        run: cargo build --workspace --all-targets

      - name: cargo test --workspace
        run: cargo test --workspace

  # -----------------------------------------------------------------
  # Lint + format check, Linux only (fastest path to feedback).
  # -----------------------------------------------------------------
  lint:
    name: clippy + fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: lint-ubuntu

      - name: cargo fmt --all -- --check
        # Soft-warn for now: we have no enforced fmt history yet, so
        # don't block PRs on it. Promote to a hard fail once the
        # codebase is fully fmt-clean.
        run: cargo fmt --all -- --check
        continue-on-error: true

      - name: cargo clippy --workspace
        # Same posture as fmt: report findings without blocking, until
        # the existing warnings are triaged. Tighten by removing
        # continue-on-error once at -D warnings == 0.
        run: cargo clippy --workspace --all-targets -- -W clippy::all
        continue-on-error: true

  # -----------------------------------------------------------------
  # Sanity: cargo check on bindings/python (PyO3 + maturin abi3).
  # The python crate is a workspace member so this is essentially
  # already covered by `test`, but we surface it as its own job for
  # clarity.
  # -----------------------------------------------------------------
  python-bindings:
    name: python bindings (cargo check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: python-ubuntu
      - run: cargo check -p duxxdb-py

  # -----------------------------------------------------------------
  # Pure-Python facade tests: unit tests (mock redis) on every Python
  # version. Runs in milliseconds, catches RESP-encoding regressions
  # at the duxxdb.server.ServerClient layer.
  # -----------------------------------------------------------------
  python-facade:
    name: python facade (${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ['3.10', '3.13']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install facade test deps
        run: pip install pytest 'redis>=5.0,<7.0'
      - name: Unit tests (mock redis)
        working-directory: bindings/python
        run: pytest tests/test_server_facade.py -v

  # -----------------------------------------------------------------
  # End-to-end smoke: spawn a real duxx-server and exercise every
  # Phase 7 RESP command through the Python facade.
  # -----------------------------------------------------------------
  python-facade-e2e:
    name: python facade e2e (live duxx-server)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: e2e-ubuntu
      - name: Build duxx-server
        run: cargo build -p duxx-server --bin duxx-server --release
      - name: Install facade test deps
        run: pip install pytest 'redis>=5.0,<7.0'
      - name: End-to-end tests against a live daemon
        working-directory: bindings/python
        env:
          DUXXDB_E2E: '1'
        run: pytest tests/test_server_e2e.py -v

  # -----------------------------------------------------------------
  # Build the maturin wheel and run the embedded-primitive Python
  # tests against it. Catches PyO3-boundary issues (PyClass naming,
  # signature mismatches, GIL handling) that `cargo check` misses.
  # -----------------------------------------------------------------
  python-wheel-tests:
    name: python wheel tests (${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ['3.10', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: wheel-ubuntu
      - name: Install maturin + pytest
        run: pip install maturin pytest
      - name: Build + install the duxxdb wheel
        working-directory: bindings/python
        run: maturin build --release && pip install --force-reinstall ../../target/wheels/duxxdb-*.whl
      - name: Run embedded-primitive tests
        working-directory: bindings/python
        run: pytest tests/test_prompt_registry.py -v
