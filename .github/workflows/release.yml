name: Release

# Triggers on annotated semver tags. Cut a release with:
#   git tag -a v0.1.0 -m 'DuxxDB v0.1.0'
#   git push origin v0.1.0
#
# Produces, on the GitHub Release for the tag:
#   * duxxdb-vX.Y.Z-x86_64-linux.tar.gz
#   * duxxdb-vX.Y.Z-aarch64-linux.tar.gz
#   * duxxdb-vX.Y.Z-x86_64-macos.tar.gz
#   * duxxdb-vX.Y.Z-aarch64-macos.tar.gz
#   * duxxdb-vX.Y.Z-x86_64-windows.zip
#   * duxxdb_X.Y.Z-1_amd64.deb       (cargo-deb)
#   * duxxdb-vX.Y.Z-SHA256SUMS
# And pushes:
#   * ghcr.io/<owner>/duxxdb:vX.Y.Z
#   * ghcr.io/<owner>/duxxdb:latest

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v0.1.0)"
        required: true

permissions:
  contents: write   # create release + upload assets
  packages: write   # push to GHCR

jobs:
  # --------------------------------------------------------------------------
  build-binaries:
    name: build-${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: duxxdb-${TAG}-x86_64-linux.tar.gz
            kind: tar
          # ARM64 Linux: GitHub now offers a native arm64 hosted runner
          # (ubuntu-24.04-arm) so we build natively instead of cross-
          # compiling. The cross approach was blocked by a stale protoc
          # in the cross-rs container (proto2 only, doesn't recognize
          # proto3 in our duxx.proto schema).
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            archive: duxxdb-${TAG}-aarch64-linux.tar.gz
            kind: tar
          # macOS Apple Silicon. macOS Intel (x86_64-apple-darwin /
          # macos-13) is intentionally omitted -- the macos-13 hosted
          # runner pool is heavily congested and stalls in the queue
          # for hours. Apple Silicon covers every Mac since late 2020;
          # Intel Mac users on 0.1.0 build from source via
          # `cargo build --release --workspace`.
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: duxxdb-${TAG}-aarch64-macos.tar.gz
            kind: tar
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: duxxdb-${TAG}-x86_64-windows.zip
            kind: zip

    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build
        shell: bash
        run: |
          set -euxo pipefail
          cargo build --release --target ${{ matrix.target }} \
            -p duxx-server -p duxx-grpc -p duxx-mcp -p duxx-coldtier \
            --features duxx-embed/http

      - name: Pack archive
        id: pack
        shell: bash
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euxo pipefail
          ARCHIVE_NAME=$(echo "${{ matrix.archive }}" | envsubst)
          STAGE="duxxdb-${TAG}-$(echo "${{ matrix.target }}" | sed -E 's/-(unknown|apple|pc)-//' | sed -E 's/-(gnu|msvc)$//')"
          mkdir -p "dist/$STAGE"

          EXT=""
          if [[ "${{ matrix.target }}" == *windows* ]]; then EXT=".exe"; fi

          for bin in duxx-server duxx-grpc duxx-mcp duxx-export; do
            cp "target/${{ matrix.target }}/release/${bin}${EXT}" "dist/${STAGE}/"
          done
          cp LICENSE NOTICE README.md "dist/${STAGE}/"
          cp docs/INSTALLATION.md docs/USER_GUIDE.md "dist/${STAGE}/" || true

          # Pack into the archive name set by the matrix. Don't try
          # to rewrite extensions -- ARCHIVE_NAME already has the
          # right .tar.gz / .zip suffix from the matrix, and any
          # ${VAR%.tar.gz}.zip substitution caused a .zip.zip bug.
          cd dist
          if [ "${{ matrix.kind }}" = "zip" ]; then
            7z a "${ARCHIVE_NAME}" "${STAGE}"
          else
            tar -czf "${ARCHIVE_NAME}" "${STAGE}"
          fi
          # Drop the staging dir; only the archive should be uploaded.
          rm -rf "${STAGE}"
          ls -la

          echo "archive_path=dist/${ARCHIVE_NAME}" >> "$GITHUB_OUTPUT"
          echo "archive_name=${ARCHIVE_NAME}"      >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          # Upload ONLY the packed archive, not the staging directory.
          # An earlier glob `dist/duxxdb-*` matched both the tar/zip
          # AND the staging dir, which sha256sum then choked on in the
          # publish job.
          name: archive-${{ matrix.target }}
          path: ${{ steps.pack.outputs.archive_path }}

  # --------------------------------------------------------------------------
  build-deb:
    name: build .deb (amd64)
    runs-on: ubuntu-latest
    needs: build-binaries
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-deb
      - name: Install cargo-deb + protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
          cargo install cargo-deb --locked
      - name: Build release binaries (amd64)
        run: |
          cargo build --release \
            -p duxx-server -p duxx-grpc -p duxx-mcp -p duxx-coldtier \
            --features duxx-embed/http
      - name: Make .deb
        run: cargo deb -p duxx-server --no-build
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: archive-deb-amd64
          path: target/debian/*.deb

  # --------------------------------------------------------------------------
  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build-binaries, build-deb]
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all archives
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: archive-*
          merge-multiple: true

      - name: Compute checksums
        shell: bash
        run: |
          cd dist
          ls -la
          # Each file class explicitly so a missing class doesn't
          # break the whole step (set -e mode). The .deb is produced
          # by cargo-deb and named after the package (`duxx-server_*`),
          # not the project (`duxxdb_*`) -- earlier `duxxdb_*` glob
          # produced a "No such file" error.
          sha256sum \
            duxxdb-*.tar.gz \
            duxxdb-*.zip \
            duxx-server_*.deb \
            > duxxdb-${{ steps.tag.outputs.tag }}-SHA256SUMS
          echo "checksums:"
          cat duxxdb-${{ steps.tag.outputs.tag }}-SHA256SUMS

      - name: Create / update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            dist/duxxdb-*
            dist/duxx-server_*.deb
            dist/*-SHA256SUMS

  # --------------------------------------------------------------------------
  # Multi-arch Docker via NATIVE runners + a manifest merge.
  # Each arch builds on its own native runner (no QEMU), pushes a
  # platform-specific tag, then a final job stitches the two into a
  # single multi-arch manifest tag. The earlier QEMU-on-amd64 path
  # was correct but took 40-60 minutes because the arm64 Rust build
  # ran emulated.
  # --------------------------------------------------------------------------
  docker-build:
    name: Build & push ${{ matrix.platform }} image
    strategy:
      fail-fast: true
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            arch_suffix: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            arch_suffix: arm64
    runs-on: ${{ matrix.runner }}
    needs: build-binaries
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push (per-arch tag)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/duxxdb:${{ steps.tag.outputs.tag }}-${{ matrix.arch_suffix }}
          provenance: false
          cache-from: type=gha,scope=${{ matrix.arch_suffix }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch_suffix }}

  # --------------------------------------------------------------------------
  # Stitch the two single-arch images into a multi-arch manifest under
  # the canonical :vX.Y.Z and :latest tags.
  # --------------------------------------------------------------------------
  docker-manifest:
    name: Push multi-arch manifest
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create + push :tag manifest
        run: |
          IMG=ghcr.io/${{ github.repository_owner }}/duxxdb
          TAG=${{ steps.tag.outputs.tag }}
          docker buildx imagetools create -t "${IMG}:${TAG}" \
            "${IMG}:${TAG}-amd64" "${IMG}:${TAG}-arm64"
          docker buildx imagetools create -t "${IMG}:latest" \
            "${IMG}:${TAG}-amd64" "${IMG}:${TAG}-arm64"
          docker buildx imagetools inspect "${IMG}:${TAG}"
